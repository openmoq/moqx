# Prometheus scrape config for the moqx stats stack.
# The relay exposes Prometheus-format metrics on its admin port (/metrics).
#
# The relay is scraped at 3s for fine-grained perf history; the relay's metrics
# are fixed-cardinality (~450 series, no per-connection/track labels), so 3s ×
# 365d stays well under the 10G disk cap. Prometheus's own self-metrics are
# scraped coarsely (60s) — they don't need fine resolution and this keeps the
# total sample rate (and disk) down.
global:
  scrape_interval: 3s
  evaluation_interval: 15s

scrape_configs:
  - job_name: moqx-relay
    metrics_path: /metrics
    static_configs:
      - targets: ['moqx:8000']
        labels:
          instance: moqx-relay

  # Host metrics (CPU / NIC / memory) for the dashboard's host panels. 5s so
  # host CPU/NIC saturation lines up with the 3s relay data during load tests.
  # This adds ~2.5 GB/yr over 15s; with the relay at 3s the total sits near the
  # 10G cap — raise PROMETHEUS_RETENTION_SIZE (~15G) to guarantee a full year.
  - job_name: node
    scrape_interval: 5s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: moqx-host

  - job_name: prometheus
    scrape_interval: 60s
    static_configs:
      - targets: ['localhost:9090']
