# Auto-provisioned dashboards for the moqx stats stack.
# Loads every *.json in this directory as a dashboard on startup.
#
# allowUiUpdates: false → provisioned dashboards are READ-ONLY in the UI (the
# default landing page). To edit: run import-dashboards.sh --dev (squelches this
# provisioner + imports editable copies), tweak in the UI, then export-dashboards.sh
# writes the JSON back here. A clean redeploy restores read-only provisioning.
apiVersion: 1

providers:
  - name: moqx
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      # Dashboard JSONs live alongside this provider file.
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
