# Auto-provisioned Prometheus datasource for the moqx stats stack.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # Fixed uid so the provisioned dashboard can reference this datasource
    # deterministically (panels use uid: prometheus).
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
