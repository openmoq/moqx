name: perf reset baseline

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET_PERF_BASELINE to publish an empty perf baseline'
        required: true
        type: string
      ref:
        description: 'Branch/tag to use for dashboard source (normally main)'
        required: false
        default: main
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  reset:
    name: stage empty perf baseline
    runs-on: ubuntu-latest
    steps:
      - name: Guard confirmation token
        run: |
          if [ "${{ inputs.confirm }}" != "RESET_PERF_BASELINE" ]; then
            echo "Refusing reset: confirm input must be RESET_PERF_BASELINE"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Stage empty Pages payload
        run: |
          OUT=perf-out
          mkdir -p "$OUT/perf"

          # Keep dashboard UI
          cp status/index.html "$OUT/index.html"

          # Publish an empty baseline; next nightly run becomes point #1.
          cat > "$OUT/perf/index.json" <<'EOF'
          {
            "runs": []
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: perf-out

  deploy:
    name: deploy empty baseline
    needs: reset
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
