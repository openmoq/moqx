name: ci pr

# PR verification: format + build/test matrix.
# Main push uses ci-main.yml which adds publish/release/notify.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  check-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: pip install clang-format==19.1.7

      - name: Check formatting
        run: bash scripts/format.sh --check

  build:
    needs: [check-format]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            preset: default
            build_dir: build
            runner: ubuntu-22.04
          - name: asan debug
            preset: san
            build_dir: build-san
            runner: [self-hosted, linode]
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.OMOQ_APP_ID }}
          private-key: ${{ secrets.OMOQ_APP_PRIV_KEY }}

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: sudo deps/moxygen/standalone/install-system-deps.sh

      - name: Setup dependencies
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash scripts/build.sh setup

      - name: Build
        run: bash scripts/build.sh --profile ${{ matrix.preset }} --build-dir ${{ matrix.build_dir }}

      - name: Test
        env:
          ASAN_OPTIONS: ${{ matrix.name == 'asan debug' && 'detect_leaks=1:abort_on_error=1' || '' }}
        run: bash scripts/build.sh test --build-dir ${{ matrix.build_dir }} -- --output-junit test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1.9.1
        if: success() || failure()
        with:
          name: "test (${{ matrix.name }})"
          path: ${{ matrix.build_dir }}/test-results.xml
          reporter: java-junit
          fail-on-empty: ${{ job.status == 'success' && 'true' || 'false' }}

  benchmark:
    needs: [check-format]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-22.04
          - name: macos
            runner: macos-latest
    name: benchmark (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.OMOQ_APP_ID }}
          private-key: ${{ secrets.OMOQ_APP_PRIV_KEY }}

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          if [[ "$(uname)" == "Darwin" ]]; then
            deps/moxygen/standalone/install-system-deps.sh
            # Unlink brew gflags to avoid conflict with the static gflags
            # bundled in the moxygen tarball (both get linked → duplicate
            # flag registration crash).
            brew unlink gflags
          else
            sudo deps/moxygen/standalone/install-system-deps.sh
          fi

      - name: Setup dependencies
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash scripts/build.sh setup

      - name: Build with benchmarks
        run: bash scripts/build.sh --benchmark

      - name: Run benchmarks
        run: ./build/benchmark/moqx_benchmark
