name: ci pr

# PR verification: format + build/test matrix.
# Main push uses ci-main.yml which adds publish/release/notify.

on:
  pull_request:
    branches: [main, release/**]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  check-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: pip install clang-format==19.1.7

      - name: Check formatting
        run: bash scripts/format.sh --check

  build:
    needs: [check-format]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            preset: default
            build_dir: build
            runner: ubuntu-22.04
          - name: linux arm64
            preset: default
            build_dir: build
            runner: ubuntu-22.04-arm
            platform: bookworm-arm64
          # macOS disabled: moxygen tarball bakes brew Cellar versioned paths
          # that break when the runner has different brew package versions.
          # Re-enable once moxygen upstream fixes cmake to use opt symlinks.
          # - name: macos
          #   preset: default
          #   build_dir: build
          #   runner: macos-latest
          - name: asan debug
            preset: san
            build_dir: build-san
            runner: [self-hosted, linode]
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          if [[ "$(uname)" == "Darwin" ]]; then
            deps/moxygen/standalone/install-system-deps.sh
            brew install coreutils
            echo "/opt/homebrew/opt/coreutils/libexec/gnubin" >> "$GITHUB_PATH"
          else
            sudo deps/moxygen/standalone/install-system-deps.sh
          fi

      - name: Setup dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOQX_PLATFORM: ${{ matrix.platform || '' }}
        run: |
          # Release branches pin a specific moxygen release tag via
          # .moxygen-release. Main uses snapshot-latest via --use-latest.
          if [ -f .moxygen-release ]; then
            export MOQX_MOXYGEN_RELEASE_TAG=$(cat .moxygen-release | tr -d '[:space:]')
            echo "Using pinned moxygen release tag: $MOQX_MOXYGEN_RELEASE_TAG"
            bash scripts/build.sh setup --no-fallback
          else
            bash scripts/build.sh setup --use-latest
          fi

      - name: Build
        run: bash scripts/build.sh --profile ${{ matrix.preset }} --build-dir ${{ matrix.build_dir }}

      - name: Test
        env:
          ASAN_OPTIONS: ${{ matrix.name == 'asan debug' && 'detect_leaks=1:abort_on_error=1' || '' }}
        run: bash scripts/build.sh test --build-dir ${{ matrix.build_dir }} -- --output-junit test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1.9.1
        if: success() || failure()
        with:
          name: "test (${{ matrix.name }})"
          path: ${{ matrix.build_dir }}/test-results.xml
          reporter: java-junit
          fail-on-empty: ${{ job.status == 'success' && 'true' || 'false' }}

  # ════════════════════════════════════════════════════════════════════════════
  # Package: build bookworm Docker image, extract binary, upload tarball.
  # Mirrors ci-main.yml `publish` minus GHCR push, smoke tests, and interop
  # client — gives PRs deployable artifacts the ansible role can install.
  # ════════════════════════════════════════════════════════════════════════════

  package:
    needs: [check-format, build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            platform: bookworm-amd64
          - arch: arm64
            runner: ubuntu-22.04-arm
            platform: bookworm-arm64
    name: package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download bookworm moxygen tarball
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOQX_PLATFORM: ${{ matrix.platform }}
        run: |
          # Release branches pin a specific moxygen release tag via
          # .moxygen-release. Main uses snapshot-latest via --use-latest.
          if [ -f .moxygen-release ]; then
            export MOQX_MOXYGEN_RELEASE_TAG=$(cat .moxygen-release | tr -d '[:space:]')
            echo "Using pinned moxygen release tag: $MOQX_MOXYGEN_RELEASE_TAG"
            bash scripts/build.sh setup --no-fallback
          else
            bash scripts/build.sh setup --use-latest --no-fallback
          fi

      - name: Stage tarball for Docker build
        run: |
          mkdir -p .docker-deps
          cp -a .scratch/moxygen-install .docker-deps/moxygen

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t moqx-pr:${{ matrix.arch }} .

      - name: Package
        id: package
        run: |
          ARTIFACT="moqx-${{ matrix.platform }}.tar.gz"
          docker cp "$(docker create --name extract moqx-pr:${{ matrix.arch }}):/usr/local/bin/moqx" .
          docker rm extract
          mkdir -p install/bin && mv moqx install/bin/
          tar czf "$ARTIFACT" -C install .
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: ${{ steps.package.outputs.artifact }}
          retention-days: 30
