# moqx relay configuration
# See: moqx dump-config-schema | scripts/gen-config-reference.sh

listeners:
  - name: main
    udp:
      socket:
        address: "::"        # Bind address (default: "::" = all interfaces)
        port: 9668            # Listen port (1-65535)
    tls:
      type: insecure          # Skip TLS for local development
      # --- OR single cert+key pair ---
      # type: file
      # cert_file: /path/to/cert.pem
      # key_file: /path/to/key.pem
      # --- OR directory with multiple certs (SNI selection) ---
      # type: directory
      # cert_dir: /etc/ssl/certs.d/     # contains <name>.crt + <name>.key pairs
      # default_cert: example.com        # optional: SNI identity for default fallback
    endpoint: "/moq-relay"    # WebTransport endpoint path
    # moqt_versions: [14, 16] # MOQT draft versions (empty = all supported)
    # quic:                   # Per-listener QUIC overrides (optional; inherits listener_defaults.quic)
    #   max_data: 33554432    # Override connection flow control window for this listener

service_defaults:
  # Default cache settings inherited by all services.
  # Per-service cache merges field-by-field: set only the fields you want to override.
  cache:
    enabled: true               # Enable relay cache
    max_tracks: 100             # Max number of cached tracks
    max_groups_per_track: 3     # Max groups per track in cache

services:
  live-streaming:
    match:
      - authority: {exact: "live.example.com"}
        path: {exact: "/moq-relay"}
      - authority: {exact: "cdn.example.com"}
        path: {prefix: "/"}
      - authority: {wildcard: "*.live.example.com"}
        path: {prefix: "/live/"}
    cache:                        # Merges with service_defaults.cache
      max_tracks: 500             # Override: 100 → 500
      max_groups_per_track: 10    # Override: 3 → 10
      # enabled: inherited (true) from service_defaults
    # upstream:                   # Optional: enable relay chaining for this service
    #   url: "moqt://origin.example.com:4433/moq-relay"
    #   tls:
    #     insecure: false         # true = skip cert verification (dev only)
    #     # ca_cert: /path/to/ca.pem  # Custom CA cert (mutually exclusive with insecure: true)

  testing:
    match:
      - authority: {wildcard: "*.test.example.com"}
        path: {prefix: "/"}

  catch-all:
    match:
      - authority: {any: true}
        path: {prefix: "/"}

admin:
  port: 9669                  # HTTP admin server port (1-65535)
  address: "::1"              # Bind address (e.g. "::1" for localhost only, "::" for all interfaces)
  plaintext: true             # Allow plain HTTP (mutually exclusive with tls)
  # tls:
  #   cert_file: /path/to/cert.pem
  #   key_file: /path/to/key.pem

# relay_id: "my-relay-1"     # Relay identity (optional; random hex string generated if absent)

# listener_defaults:          # Default settings inherited by all listeners
#   quic:                     # QUIC transport tunables (optional; uses sensible defaults)
#     max_data: 67108864      # Connection flow control window (bytes, default: 64MB)
#     max_stream_data: 16777216 # Per-stream flow control window (bytes, default: 16MB)
#     max_uni_streams: 8192   # Max concurrent unidirectional streams (default: 8192)
#     max_bidi_streams: 16    # Max concurrent bidirectional streams (default: 16)
