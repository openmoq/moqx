# moqx relay configuration
# See: moqx dump-config-schema | scripts/gen-config-reference.sh

listeners:
  - name: main
    udp:
      socket:
        address: "::"        # Bind address (default: "::" = all interfaces)
        port: 9668            # Listen port (1-65535)
    tls:
      # cert_file: /path/to/cert.pem   # Required when insecure: false
      # key_file: /path/to/key.pem     # Required when insecure: false
      insecure: true          # Skip TLS for local development
    endpoint: "/moq-relay"    # WebTransport endpoint path
    # moqt_versions: [14, 16] # MOQT draft versions (empty = default 14,16)
    # quic:                   # Per-listener QUIC overrides (optional; inherits listener_defaults.quic)
    #   max_data: 33554432    # Override connection flow control window for this listener

service_defaults:
  # Default cache settings inherited by all services.
  # Per-service cache merges field-by-field: set only the fields you want to override.
  cache:
    enabled: true                        # Enable relay cache
    max_tracks: 100                      # Max number of cached tracks
    max_groups_per_track: 3              # Max cached groups per track
    # max_cached_mb: 16                  # Max total cache size in MB. Default: 16. 0 is invalid.
    # min_eviction_kb: 64                # Eviction batch floor in KB. Default: 64.
    # max_cache_duration_s: 86400        # Max TTL (seconds) for any track; clamps publisher-set values.
                                         # Also the default when default_max_cache_duration_s is absent.
                                         # Default: 86400 (1 day). 0 is invalid.
    # default_max_cache_duration_s: 300  # Default TTL (seconds) for tracks without a publisher-set duration.
                                         # Absent: use max_cache_duration_s.
                                         # 0: opt-in-only (don't cache tracks unless publisher sets a duration).

services:
  live-streaming:
    match:
      - authority: {exact: "live.example.com"}
        path: {exact: "/moq-relay"}
      - authority: {exact: "cdn.example.com"}
        path: {prefix: "/"}
      - authority: {wildcard: "*.live.example.com"}
        path: {prefix: "/live/"}
    cache:                        # Merges with service_defaults.cache
      max_tracks: 500             # Override: 100 → 500
      max_groups_per_track: 10    # Override: 3 → 10
      # enabled: inherited (true) from service_defaults
      # max_cached_mb: 100                  # Override: cap this service at 100 MB
      # min_eviction_kb: 200               # Override: larger eviction batch floor for this service
      # max_cache_duration_s: 3600         # Override: tighter max TTL for this service
      # default_max_cache_duration_s: 60   # Override: tighter default TTL for this service
      # default_max_cache_duration_s: 0    # Override: opt-in-only for this service
    # upstream:                   # Optional: enable relay chaining for this service
    #   url: "moqt://origin.example.com:4433/moq-relay"
    #   tls:
    #     insecure: false         # true = skip cert verification (dev only)
    #     # ca_cert: /path/to/ca.pem  # Custom CA cert (mutually exclusive with insecure: true)
    # auth:                       # Optional: enable CAT-style authorization for this service
    #   enabled: true             # Turn auth on for this service (default: false)
    #   token_type: 16            # MOQT AUTHORIZATION_TOKEN type for CAT4MOQ/moqxr; 0 is valid for private deployments
    #   hmac_keys:                # Keys that sign/verify CAT tokens (HMAC-SHA256)
    #     - id: "cat-dev"         # Key ID carried in the token envelope; selects which secret verifies it
    #       secret: "replace-with-long-random-secret"   # Shared secret used by moqx issue-cat-token
    #   require_setup_token: true            # Require a client_setup token during CLIENT_SETUP
    #   allow_request_token_override: true   # Allow a per-request token to override the session's setup grants
    #   strict_claims: false       # Keep false for current CAT4MOQ interop unless all issuers send only supported claims

  testing:
    match:
      - authority: {wildcard: "*.test.example.com"}
        path: {prefix: "/"}

  catch-all:
    match:
      - authority: {any: true}
        path: {prefix: "/"}

admin:
  port: 9669                  # HTTP admin server port (1-65535)
  address: "::1"              # Bind address (e.g. "::1" for localhost only, "::" for all interfaces)
  plaintext: true             # Allow plain HTTP (mutually exclusive with tls)
  # tls:
  #   cert_file: /path/to/cert.pem
  #   key_file: /path/to/key.pem

logging:                    # Logging configuration (optional)
  mlog:                     # MoQ-level structured logging
    dir: "/tmp/moqx-mlog"          # Output directory for per-session mlog files
    sample_rate: 1              # Fraction of sessions to log (0.0–1.0, default: 1.0)


# relay_id: "my-relay-1"     # Relay identity (optional; random hex string generated if absent)

# listener_defaults:          # Default settings inherited by all listeners
#   quic:                     # QUIC transport tunables (optional; uses sensible defaults)
#     max_data: 67108864      # Connection flow control window (bytes, default: 64MB)
#     max_stream_data: 16777216 # Per-stream flow control window (bytes, default: 16MB)
#     max_uni_streams: 8192   # Max concurrent unidirectional streams (default: 8192)
#     max_bidi_streams: 16    # Max concurrent bidirectional streams (default: 16)
