# o-rly relay configuration
# See: o_rly dump-config-schema | scripts/gen-config-reference.sh

listeners:
  - name: main
    udp:
      socket:
        address: "::"        # Bind address (default: "::" = all interfaces)
        port: 9668            # Listen port (1-65535)
    tls:
      type: insecure          # Skip TLS for local development
      # --- OR single cert+key pair ---
      # type: file
      # cert_file: /path/to/cert.pem
      # key_file: /path/to/key.pem
      # --- OR directory with multiple certs (SNI selection) ---
      # type: directory
      # cert_dir: /etc/ssl/certs.d/     # contains <name>.crt + <name>.key pairs
      # default_cert: example.com        # optional: SNI identity for default fallback
    endpoint: "/moq-relay"    # WebTransport endpoint path
    # moqt_versions: [14, 16] # MOQT draft versions (empty = all supported)

cache:
  enabled: true               # Enable relay cache
  max_tracks: 100             # Max number of cached tracks
  max_groups_per_track: 3     # Max groups per track in cache

admin:
  port: 9669                  # HTTP admin server port (1-65535)
  address: "::1"              # Bind address (e.g. "::1" for localhost only, "::" for all interfaces)
  plaintext: true             # Allow plain HTTP (mutually exclusive with tls)
  # tls:
  #   cert_file: /path/to/cert.pem
  #   key_file: /path/to/key.pem
